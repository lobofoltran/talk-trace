name: Docker Build and Deploy

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  test-docker:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker Compose
      run: |
        docker-compose build

    - name: Start Services
      run: |
        docker-compose up -d

    - name: Wait for Services
      run: |
        sleep 30

    - name: Test Health Endpoints
      run: |
        curl -f http://localhost:8000/health || exit 1
        curl -f http://localhost:8001/health || exit 1

    - name: Test API Endpoints
      run: |
        # Test orchestrator
        curl -X POST http://localhost:8000/sessions \
          -H "Content-Type: application/json" \
          -d '{"session_id": "test-session"}' || exit 1
        
        # Test transcriber
        curl -X POST http://localhost:8001/transcribe \
          -H "Content-Type: application/json" \
          -d '{"session_id": "test-session", "model": "whisper"}' || exit 1

    - name: Show Logs
      if: failure
      run: |
        docker-compose logs

    - name: Cleanup
      run: |
        docker-compose down -v

  build-and-push:
    runs-on: ubuntu-latest
    needs: test-docker
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: lobofoltran/talktrace
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}

    - name: Build and push Orchestrator
      uses: docker/build-push-action@v5
      with:
        context: ./services/orchestrator
        push: true
        tags: lobofoltran/talktrace-orchestrator:latest,lobofoltran/talktrace-orchestrator:${{ github.ref_name }}
        labels: ${{ steps.meta.outputs.labels }}

    - name: Build and push Transcriber
      uses: docker/build-push-action@v5
      with:
        context: ./services/transcriber
        push: true
        tags: lobofoltran/talktrace-transcriber:latest,lobofoltran/talktrace-transcriber:${{ github.ref_name }}
        labels: ${{ steps.meta.outputs.labels }}
